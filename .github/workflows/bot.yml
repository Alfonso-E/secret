# Hourly trading bot run on GitHub-hosted runners.
#
# Cost: free for public repos; ~360 min/month for hourly runs, well under the
# 2,000-min free tier for private repos.
#
# Cron schedule is BEST-EFFORT on GitHub Actions (can be delayed 5-15 min during
# peak load). Our strategy rebalances on smoothed funding rates, so a few minutes
# of jitter is fine — we still catch each 8h funding window.
#
# Manual triggering: Actions tab in your repo -> Crypto trading bot -> "Run workflow".

name: Crypto trading bot

on:
  schedule:
    # Two triggers per hour to fight GitHub Actions cron jitter. Empirically
    # a single :17 cron landed every ~90 minutes (range 95-155 min) instead
    # of every 60. Doubling the cron triggers should drop the average
    # interval to ~45 min. Both runs are idempotent — the state-diffing
    # reconciler returns "0 actions" if nothing has changed.
    - cron: "17 * * * *"
    - cron: "47 * * * *"
  workflow_dispatch:            # manual triggering from the UI
    inputs:
      live:
        description: "Submit real orders? (otherwise dry-run)"
        type: boolean
        default: false
  # Fallback trigger: external services (cron-job.org, etc.) can POST to
  #   https://api.github.com/repos/<owner>/<repo>/dispatches
  # with body {"event_type": "run-bot"} to fire this workflow. Use this if
  # GitHub's built-in cron proves too unreliable on your private repo.
  repository_dispatch:
    types: [run-bot]

# Limit to a single concurrent run — if a previous cycle is still going,
# skip this one rather than racing it.
concurrency:
  group: trading-bot
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      # === Credentials are configured in:
      #   GitHub repo -> Settings -> Secrets and variables -> Actions -> New repository secret
      BITGET_ENV:           ${{ secrets.BITGET_ENV || 'demo' }}
      BITGET_API_KEY:        ${{ secrets.BITGET_API_KEY }}
      BITGET_API_SECRET:     ${{ secrets.BITGET_API_SECRET }}
      BITGET_API_PASSPHRASE: ${{ secrets.BITGET_API_PASSPHRASE }}
      # Optional: Discord notifications for live trades, errors, daily summary.
      # If unset, all notify() calls are silent no-ops.
      DISCORD_WEBHOOK_URL:   ${{ secrets.DISCORD_WEBHOOK_URL }}
      # Set this repo VARIABLE (not secret) to "true" when you're ready to flip
      # to real demo trading. Default: dry-run.
      BOT_LIVE: ${{ vars.BOT_LIVE || 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Persist data/ (market caches) AND logs/ (state.json with peak equity,
      # run counter, etc.) across runs. We use restore-keys to find the most
      # recent cache from any prior run, then save with a unique key so each
      # cycle creates a fresh cache entry (old ones evict via LRU).
      - name: Restore previous state + market-data cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/
            logs/
          key:  bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-
            market-data-

      - name: Run bot (single pass)
        run: |
          MODE_FLAG=""
          # The manual-trigger input takes precedence over the repo variable.
          if [ "${{ github.event.inputs.live }}" = "true" ] || [ "$BOT_LIVE" = "true" ]; then
            MODE_FLAG="--live"
            echo "::warning ::Running in LIVE mode — orders will actually be submitted."
          else
            echo "Running in DRY-RUN mode."
          fi
          python live_bot.py $MODE_FLAG

      - name: Save updated state + market-data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/
            logs/
          key: bot-state-${{ github.run_id }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
